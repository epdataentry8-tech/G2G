<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G2G Master Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-mode { border: 2px solid #3b82f6; background: #eff6ff; color: #1e40af; }
        #reader { width: 100% !important; border-radius: 1.5rem; overflow: hidden; background: #000; }
        .duplicate-flash { animation: shake 0.5s ease-in-out; border: 2px solid #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-10 font-sans">

    <div id="camera-gate" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center p-8 text-center">
        <h2 class="text-2xl font-black mb-6 uppercase tracking-tighter">G2G <span class="text-blue-500">Scanner</span></h2>
        <button onclick="initApp()" class="w-full max-w-xs bg-blue-600 text-white py-5 rounded-3xl font-black shadow-2xl active:scale-95 transition-all">
            START SESSION
        </button>
    </div>

    <div class="max-w-md mx-auto p-4 space-y-4">
        <header class="flex justify-between items-center">
            <h1 class="text-xl font-black italic">G2G <span class="text-blue-500">PRO</span></h1>
            <div id="sync-status" class="text-[9px] bg-slate-800 px-2 py-1 rounded-full text-emerald-500 font-bold">LIVE SYNC</div>
        </header>

        <div class="flex bg-slate-800 p-1 rounded-2xl border border-slate-700">
            <button id="btn-s" onclick="setMode('single')" class="flex-1 py-2 text-xs font-black rounded-xl active-mode">SINGLE</button>
            <button id="btn-b" onclick="setMode('batch')" class="flex-1 py-2 text-xs font-black rounded-xl text-slate-500">BATCH</button>
        </div>

        <div id="reader" class="shadow-2xl border-2 border-slate-800"></div>

        <div id="form-container" class="bg-slate-800/50 p-5 rounded-3xl border border-slate-700 space-y-4 backdrop-blur-md">
            
            <div class="space-y-3">
                <div class="relative">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Driver</label>
                    <input list="drivers" id="driver" onchange="savePersistentData()" class="w-full bg-slate-900/50 p-3 rounded-xl text-sm border border-slate-700 focus:border-blue-500 outline-none" placeholder="Search Driver...">
                    <datalist id="drivers"></datalist>
                </div>
                <div class="relative">
                    <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Drop-off Address</label>
                    <input list="addresses" id="dropoff" onchange="savePersistentData()" class="w-full bg-slate-900/50 p-3 rounded-xl text-sm border border-slate-700 focus:border-blue-500 outline-none" placeholder="Search Location...">
                    <datalist id="addresses"></datalist>
                </div>
            </div>

            <div class="relative">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Current Scan</label>
                <input id="ref-id" readonly class="w-full bg-transparent text-xl font-mono font-bold text-blue-400 border-b border-slate-700 py-1 outline-none" placeholder="---">
            </div>

            <button onclick="submitData()" id="btn-submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">
                Submit & Sync
            </button>
            
            <button onclick="clearSession()" class="w-full text-slate-500 text-[9px] font-bold uppercase tracking-widest py-1 opacity-50">Clear Saved Driver/Address</button>
        </div>

        <div class="bg-slate-900 p-4 rounded-3xl border border-slate-800">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-widest">History (Last 5)</h3>
            <div id="history-list" class="space-y-2 text-xs font-mono">
                <div class="text-slate-600 italic">No scans yet.</div>
            </div>
        </div>
    </div>

    <script>
        // Replace with your Google URL
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyxzLAkTQ2X4AUhlz2P7WT9zJ0EFfeUAnPA8aIXcJS5ezyPTNYwakcPuADuv9QE1jrb/exec";
        
        let currentMode = 'single';
        let scanBuffer = [];
        let history = [];
        let existingIDs = [];
        let html5QrCode;
        let audioCtx;

        // 1. Initialize App & Load Saved Info
        async function initApp() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('camera-gate').classList.add('hidden');
            
            // Load persistent data from Browser Memory
            if(localStorage.getItem('g2g_driver')) document.getElementById('driver').value = localStorage.getItem('g2g_driver');
            if(localStorage.getItem('g2g_address')) document.getElementById('dropoff').value = localStorage.getItem('g2g_address');

            // Fetch list updates from Google
            try {
                const response = await fetch(`${GOOGLE_URL}?action=getSettings`);
                const data = await response.json();
                document.getElementById('drivers').innerHTML = data.drivers.map(d => `<option value="${d}">`).join('');
                document.getElementById('addresses').innerHTML = data.addresses.map(a => `<option value="${a}">`).join('');
                existingIDs = data.existingIDs;
            } catch (e) { console.log("Offline mode: using cached data."); }
            
            startScanner();
        }

        function savePersistentData() {
            localStorage.setItem('g2g_driver', document.getElementById('driver').value);
            localStorage.setItem('g2g_address', document.getElementById('dropoff').value);
        }

        function clearSession() {
            localStorage.removeItem('g2g_driver');
            localStorage.removeItem('g2g_address');
            document.getElementById('driver').value = "";
            document.getElementById('dropoff').value = "";
            alert("Local storage cleared.");
        }

        function playBeep() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 800;
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScan);
        }

        function onScan(text) {
            if (existingIDs.includes(text) || scanBuffer.includes(text)) {
                document.getElementById('form-container').classList.add('duplicate-flash');
                setTimeout(() => document.getElementById('form-container').classList.remove('duplicate-flash'), 500);
                return; 
            }
            document.getElementById('ref-id').value = text;
            playBeep();
            if (currentMode === 'batch') {
                scanBuffer.push(text);
                updateHistory(text);
            }
        }

        function updateHistory(id) {
            history.unshift({ id, time: new Date().toLocaleTimeString() });
            if (history.length > 5) history.pop();
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="flex justify-between bg-slate-800/30 p-2 rounded-lg border border-slate-700/50">
                    <span class="text-blue-400 font-bold">${h.id}</span>
                    <span class="text-slate-500">${h.time}</span>
                </div>
            `).join('');
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('btn-s').className = m === 'single' ? "flex-1 py-2 text-xs font-black rounded-xl active-mode" : "flex-1 py-2 text-xs font-black rounded-xl text-slate-500";
            document.getElementById('btn-b').className = m === 'batch' ? "flex-1 py-2 text-xs font-black rounded-xl active-mode" : "flex-1 py-2 text-xs font-black rounded-xl text-slate-500";
            scanBuffer = [];
        }

        async function submitData() {
            const driver = document.getElementById('driver').value;
            const address = document.getElementById('dropoff').value;
            const id = document.getElementById('ref-id').value;

            if (!driver || !address || (!id && scanBuffer.length === 0)) return alert("Missing Info!");

            const btn = document.getElementById('btn-submit');
            btn.innerText = "SYNCING...";
            btn.disabled = true;

            const payload = {
                id: currentMode === 'single' ? id : scanBuffer.join(', '),
                driver, dropoff: address, mode: currentMode
            };

            try {
                await fetch(GOOGLE_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
                if(currentMode === 'single') updateHistory(id);
                existingIDs.push(...(currentMode === 'single' ? [id] : scanBuffer));
                document.getElementById('ref-id').value = "";
                scanBuffer = [];
                // WE DO NOT CLEAR DRIVER OR ADDRESS HERE ANYMORE!
            } catch (e) { alert("Sync Error!"); }

            btn.innerText = "Submit & Sync";
            btn.disabled = false;
        }
    </script>
</body>
</html>
