        .active-mode { border: 2px solid #3b82f6; background: #eff6ff; color: #1e40af; }
        #reader { width: 100% !important; border-radius: 1.5rem; overflow: hidden; background: #000; transition: all 0.3s; }
        .duplicate-flash { animation: shake 0.5s ease-in-out; border: 4px solid #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        input::placeholder { color: #475569; }
        #success-popup { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 200; background: #10b981; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.3); animation: slideDown 0.5s ease; }

        .expand-btn { background: #1e293b; color: #3b82f6; padding: 2px 10px; border-radius: 8px; font-size: 10px; border: 1px solid #334155; font-weight: 800; }
    </style>

    <script>
        const GOOGLE_URL = "PASTE_YOUR_NEW_DEPLOYMENT_URL_HERE";
        let currentMode = 'single';
        let scanBuffer = [];
        let history = [];
        let existingIDs = [];
        let html5QrCode;
        let audioCtx;

        async function initApp() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('camera-gate').classList.add('hidden');
            if(localStorage.getItem('g2g_driver')) document.getElementById('driver').value = localStorage.getItem('g2g_driver');
            if(localStorage.getItem('g2g_address')) document.getElementById('dropoff').value = localStorage.getItem('g2g_address');
            try {
                const response = await fetch(`${GOOGLE_URL}?action=getSettings`);
                const data = await response.json();
                existingIDs = data.existingIDs;
            } catch (e) { console.log("Offline Check active."); }
            startScanner();
        }

        function toggleList(id) {
            const input = document.getElementById(id);
            input.value = "";
            input.focus();
        }

        function savePersistentData() {
            localStorage.setItem('g2g_driver', document.getElementById('driver').value);
            localStorage.setItem('g2g_address', document.getElementById('dropoff').value);
        }

        function clearSession() {
            if(confirm("Wipe saved driver and address?")) {
                localStorage.removeItem('g2g_driver');
                localStorage.removeItem('g2g_address');
                document.getElementById('driver').value = "";
                document.getElementById('dropoff').value = "";
            }
        }

        function playBeep(freq = 900) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 24, qrbox: {width: 280, height: 180} }, onScan);
        }

        function onScan(text) {
            const container = document.getElementById('form-container');
            if (existingIDs.includes(text) || scanBuffer.includes(text)) {
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                playBeep(300);
                container.classList.add('duplicate-flash');
                setTimeout(() => container.classList.remove('duplicate-flash'), 500);
                return; 
            }
            if (currentMode === 'single') {
                document.getElementById('ref-id').value = text;
            } else {
                if(!scanBuffer.includes(text)) {
                    scanBuffer.push(text);
                    updateBatchDisplay();
                }
            }
            playBeep();
            if (navigator.vibrate) navigator.vibrate(100);
        }

        function updateBatchDisplay() {
            document.getElementById('ref-id').value = `BATCH: ${scanBuffer.length} ITEMS`;
            const list = document.getElementById('history-list');
            list.innerHTML = scanBuffer.slice().reverse().slice(0, 5).map(id => `
                <div class="flex justify-between items-center bg-blue-500/10 p-3 rounded-xl border border-blue-500/20">
                    <span class="text-blue-400 font-black font-mono tracking-tighter">${id}</span>
                    <span class="text-[10px] text-blue-500 font-bold italic text-right uppercase">Queued</span>
                </div>
            `).join('');
        }

        function updateHistory(id) {
            history.unshift({ id, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
            if (history.length > 5) history.pop();
            const list = document.getElementById('history-list');
            list.innerHTML = history.map(h => `
                <div class="flex justify-between items-center bg-slate-800/60 p-3 rounded-xl border border-slate-700/50">
                    <span class="text-blue-400 font-black font-mono tracking-tighter">${h.id}</span>
                    <span class="text-[10px] text-slate-500 font-bold">${h.time}</span>
                </div>
            `).join('');
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('btn-s').className = m === 'single' ? "flex-1 py-2.5 text-xs font-black rounded-xl active-mode transition-all" : "flex-1 py-2.5 text-xs font-black rounded-xl text-slate-500 transition-all";
            document.getElementById('btn-b').className = m === 'batch' ? "flex-1 py-2.5 text-xs font-black rounded-xl active-mode transition-all" : "flex-1 py-2.5 text-xs font-black rounded-xl text-slate-500 transition-all";
            document.getElementById('id-label-text').innerText = m === 'single' ? "Active Reference ID" : "Batch Progress";
            document.getElementById('history-title-text').innerText = m === 'single' ? "Session History" : "Batch Queue";
            scanBuffer = [];
            document.getElementById('ref-id').value = "";
            document.getElementById('history-list').innerHTML = `<div class="text-slate-700 text-xs italic text-center py-2">Scanner ready...</div>`;
        }

        function showSuccessToast() {
            const popup = document.getElementById('success-popup');
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 3000);
        }

        async function submitData() {
            const driver = document.getElementById('driver').value;
            const address = document.getElementById('dropoff').value;
            const notes = document.getElementById('notes').value;
            let idValue = document.getElementById('ref-id').value;
            const finalId = currentMode === 'single' ? idValue : scanBuffer.join(', ');

            if (!driver || !address || (!finalId && scanBuffer.length === 0)) {
                alert("⚠️ Error: Missing Information."); return;
            }

            const btn = document.getElementById('btn-submit');
            btn.innerHTML = `<span>SYNCING...</span>`; btn.disabled = true;

            const payload = { id: finalId, driver, dropoff: address, mode: currentMode, notes: notes };

            try {
                await fetch(GOOGLE_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
                showSuccessToast();
                if (currentMode === 'single') {
                    updateHistory(finalId);
                    document.getElementById('driver').value = "";
                    document.getElementById('dropoff').value = "";
                    document.getElementById('ref-id').value = "";
                    document.getElementById('notes').value = "";
                    localStorage.removeItem('g2g_driver');
                    localStorage.removeItem('g2g_address');
                    existingIDs.push(finalId);
                } else {
                    existingIDs.push(...scanBuffer);
                    scanBuffer = [];
                    document.getElementById('ref-id').value = "";
                    document.getElementById('notes').value = "";
                }
                if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
            } catch (e) { alert("Sync Error."); }
            btn.innerHTML = `<span>SUBMIT & SYNC TO CLOUD</span>`; btn.disabled = false;
        }
    </script>
</body>
</html>
